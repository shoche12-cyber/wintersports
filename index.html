<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="遠征プランナー">
<title>スノボ遠征プランナー</title>
<style>
  /* ===== リセット・ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #f2f2f7; font-family: -apple-system, 'Hiragino Sans', sans-serif; overscroll-behavior: none; }

  /* ===== カラー変数 ===== */
  :root {
    --navy: #0a1628;
    --blue: #007aff;
    --blue-light: #e8f1ff;
    --green: #34c759;
    --green-light: #e8f9ed;
    --red: #ff3b30;
    --gray1: #8e8e93;
    --gray2: #c7c7cc;
    --gray3: #f2f2f7;
    --gray4: #e5e5ea;
    --white: #ffffff;
    --text: #000000;
    --text2: #3c3c43;
    --text3: #8e8e93;
    --separator: rgba(60,60,67,0.12);
    --tab-height: 83px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 44px);
  }

  /* ===== アプリ全体 ===== */
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ===== ナビゲーションバー ===== */
  .nav-bar {
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
    padding-top: var(--safe-top);
    flex-shrink: 0;
    z-index: 10;
  }
  .nav-inner { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  .nav-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .nav-btn { font-size: 17px; color: var(--blue); background: none; border: none; cursor: pointer; padding: 4px 0; font-family: inherit; }
  .nav-back { display: flex; align-items: center; gap: 2px; }
  .nav-back::before { content: '‹'; font-size: 22px; line-height: 1; margin-top: -2px; }

  /* ===== コンテンツエリア ===== */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content-inner { padding-bottom: calc(var(--tab-height) + 8px); }

  /* ===== タブバー ===== */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--tab-height);
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--separator);
    display: flex; z-index: 100;
    padding-bottom: var(--safe-bottom);
  }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; padding-top: 8px; color: var(--gray1); font-family: inherit; }
  .tab-item.active { color: var(--blue); }
  .tab-icon { font-size: 24px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; }

  /* ===== グループリスト（iOSスタイル）===== */
  .list-section { margin: 20px 16px 0; }
  .list-header { font-size: 13px; color: var(--text3); margin-bottom: 6px; padding: 0 4px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.03em; }
  .list-group { background: var(--white); border-radius: 12px; overflow: hidden; }
  .list-row { display: flex; align-items: center; min-height: 44px; padding: 10px 16px; border-bottom: 0.5px solid var(--separator); gap: 12px; cursor: pointer; -webkit-user-select: none; }
  .list-row:last-child { border-bottom: none; }
  .list-row:active { background: var(--gray3); }
  .list-row-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .icon-blue { background: #007aff; }
  .icon-green { background: #34c759; }
  .icon-teal { background: #5ac8fa; }
  .icon-orange { background: #ff9500; }
  .list-row-body { flex: 1; min-width: 0; }
  .list-row-title { font-size: 17px; color: var(--text); }
  .list-row-sub { font-size: 13px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--gray2); font-size: 18px; font-weight: 300; }
  .list-badge { background: var(--blue); color: #fff; font-size: 13px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }

  /* ===== ヒーローカード ===== */
  .hero-card { background: var(--navy); border-radius: 16px; padding: 20px; color: #fff; margin: 16px; }
  .hero-card.green-card { background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%); }
  .hero-name { font-size: 22px; font-weight: 600; margin-bottom: 3px; }
  .hero-sub { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 16px; }
  .hero-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .hero-tag { font-size: 12px; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.95); }
  .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 0.5px solid rgba(255,255,255,0.2); padding-top: 14px; gap: 0; }
  .hero-stat { text-align: center; }
  .hero-stat + .hero-stat { border-left: 0.5px solid rgba(255,255,255,0.2); }
  .hstat-v { font-size: 17px; font-weight: 600; }
  .hstat-l { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .hero-stat4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px; border-top: 0.5px solid rgba(255,255,255,0.2); padding-top: 14px; }
  .hstat4 { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px; }
  .hstat4-v { font-size: 17px; font-weight: 600; }
  .hstat4-l { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .hero-url { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 12px; margin-top: 10px; cursor: pointer; }
  .hero-url span { font-size: 13px; color: rgba(255,255,255,0.85); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== フォーム ===== */
  .form-section { margin: 20px 16px 0; }
  .form-group { background: var(--white); border-radius: 12px; overflow: hidden; }
  .form-row { display: flex; align-items: center; min-height: 44px; padding: 0 16px; border-bottom: 0.5px solid var(--separator); gap: 12px; }
  .form-row:last-child { border-bottom: none; }
  .form-label { font-size: 17px; color: var(--text); min-width: 88px; flex-shrink: 0; }
  .form-row input, .form-row select, .form-row textarea {
    flex: 1; border: none; outline: none; font-size: 17px; color: var(--text); background: transparent;
    font-family: inherit; text-align: right; min-height: 44px; -webkit-appearance: none;
  }
  .form-row input::placeholder { color: var(--gray2); }
  .form-row textarea { text-align: left; resize: none; padding: 10px 0; min-height: 80px; }
  .form-row select { color: var(--text); }
  .form-unit { font-size: 15px; color: var(--text3); flex-shrink: 0; }

  /* ===== ボタン ===== */
  .ios-btn { display: block; width: calc(100% - 32px); margin: 12px 16px; padding: 14px; border: none; border-radius: 12px; font-size: 17px; font-weight: 500; font-family: inherit; cursor: pointer; text-align: center; -webkit-appearance: none; }
  .ios-btn:active { opacity: 0.75; }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-secondary { background: var(--white); color: var(--blue); border: 0.5px solid var(--separator); }
  .btn-danger { background: var(--white); color: var(--red); border: 0.5px solid var(--separator); }
  .btn-disabled { opacity: 0.5; }

  /* ===== メンバーチップ ===== */
  .chips-wrap { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px; align-items: center; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-light); border-radius: 16px; padding: 5px 5px 5px 12px; font-size: 14px; color: var(--blue); }
  .chip-del { width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.15); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; line-height: 1; }
  .chip-empty { font-size: 14px; color: var(--text3); }

  /* ===== 雪質情報ボックス ===== */
  .snow-box { background: var(--white); border-radius: 12px; overflow: hidden; margin: 0 16px; }
  .snow-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--separator); }
  .snow-row:last-child { border-bottom: none; }
  .snow-key { font-size: 15px; color: var(--text3); }
  .snow-val { font-size: 15px; color: var(--text); font-weight: 500; }
  .snow-val.good { color: var(--green); }
  .snow-val.pending { color: var(--text3); font-weight: 400; }

  /* ===== 費用バー ===== */
  .cost-bar-row { padding: 10px 16px; border-bottom: 0.5px solid var(--separator); }
  .cost-bar-row:last-child { border-bottom: none; }
  .cost-bar-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .cost-bar-name { font-size: 14px; color: var(--text2); }
  .cost-bar-val { font-size: 14px; font-weight: 500; color: var(--text); }
  .cost-bar-bg { background: var(--gray3); border-radius: 4px; height: 6px; overflow: hidden; }
  .cost-bar-fill { height: 6px; border-radius: 4px; transition: width 0.3s; }

  /* ===== AIチャット ===== */
  .chat-area { display: flex; flex-direction: column; }
  .chat-msgs { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 10px 14px; font-size: 15px; line-height: 1.5; word-break: break-word; }
  .msg.ai { background: var(--white); color: var(--text); border-radius: 18px 18px 18px 4px; align-self: flex-start; }
  .msg.user { background: var(--blue); color: #fff; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
  .msg.typing { background: var(--white); color: var(--text3); border-radius: 18px 18px 18px 4px; align-self: flex-start; font-size: 20px; padding: 6px 14px; }
  .chat-chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 16px 8px; }
  .chat-chip { font-size: 13px; padding: 6px 13px; border-radius: 16px; border: 1px solid var(--gray4); background: var(--white); color: var(--text2); cursor: pointer; -webkit-user-select: none; }
  .chat-chip:active { background: var(--gray3); }
  .chat-input-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-top: 0.5px solid var(--separator); background: rgba(255,255,255,0.95); }
  .chat-input-bar input { flex: 1; background: var(--gray3); border: none; border-radius: 20px; padding: 9px 14px; font-size: 15px; color: var(--text); font-family: inherit; outline: none; }
  .chat-send { width: 36px; height: 36px; border-radius: 50%; background: var(--blue); border: none; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .chat-send:disabled { background: var(--gray4); }

  /* ===== ステータスメッセージ ===== */
  .status-msg { text-align: center; font-size: 14px; color: var(--green); padding: 6px 16px; min-height: 28px; }

  /* ===== 空の状態 ===== */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 17px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; }

  /* ===== 情報行 ===== */
  .info-section { margin: 16px 16px 0; background: var(--white); border-radius: 12px; overflow: hidden; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--separator); }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 15px; color: var(--text3); }
  .info-val { font-size: 15px; color: var(--text); font-weight: 500; max-width: 60%; text-align: right; }

  /* ===== APIキー設定画面 ===== */
  .apikey-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 12px; margin: 16px; padding: 14px 16px; }
  .apikey-banner-title { font-size: 15px; font-weight: 600; color: #856404; margin-bottom: 4px; }
  .apikey-banner-text { font-size: 13px; color: #856404; line-height: 1.5; }
  .apikey-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .apikey-input-row input { flex: 1; border: 1px solid var(--gray4); border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none; }
  .apikey-input-row button { background: #856404; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-family: inherit; cursor: pointer; white-space: nowrap; }

  /* ===== 遠征の日程行 ===== */
  .schedule-list { margin: 0 16px; background: var(--white); border-radius: 12px; overflow: hidden; }
  .schedule-row { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--separator); align-items: flex-start; }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-date { width: 40px; text-align: center; flex-shrink: 0; }
  .schedule-date-d { font-size: 13px; font-weight: 600; color: var(--text); }
  .schedule-date-w { font-size: 11px; color: var(--text3); }
  .schedule-body { flex: 1; }
  .schedule-title { font-size: 15px; font-weight: 500; color: var(--text); }
  .schedule-sub { font-size: 13px; color: var(--text3); margin-top: 1px; }

  /* ===== ユーティリティ ===== */
  .spacer-sm { height: 12px; }
  .spacer-md { height: 20px; }
  .divider { height: 0.5px; background: var(--separator); margin: 0 16px; }
</style>
</head>
<body>
<div id="app">
  <div class="nav-bar">
    <div class="nav-inner">
      <button class="nav-btn nav-back" id="nav-back-btn" style="visibility:hidden" onclick="goBack()">遠征</button>
      <span class="nav-title" id="nav-title">遠征プランナー</span>
      <button class="nav-btn" id="nav-right-btn" style="visibility:hidden" onclick="navRightAction()">完了</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="content-inner" id="content-inner"></div>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button class="tab-item active" onclick="switchTab('trips')" id="tab-trips">
      <span class="tab-icon">🗓</span>
      <span class="tab-label">遠征</span>
    </button>
    <button class="tab-item" onclick="switchTab('resorts')" id="tab-resorts">
      <span class="tab-icon">⛷️</span>
      <span class="tab-label">ゲレンデ</span>
    </button>
    <button class="tab-item" onclick="switchTab('cost')" id="tab-cost">
      <span class="tab-icon">💰</span>
      <span class="tab-label">費用</span>
    </button>
    <button class="tab-item" onclick="switchTab('ai')" id="tab-ai">
      <span class="tab-icon">🤖</span>
      <span class="tab-label">AI相談</span>
    </button>
    <button class="tab-item" onclick="switchTab('gear')" id="tab-gear">
      <span class="tab-icon">🎿</span>
      <span class="tab-label">ギア</span>
    </button>
  </div>
</div>

<script>
// ===== 状態管理 =====
var state = {
  tab: 'trips',
  screen: 'main',   // main / trip-detail / trip-add / resort-list / resort-detail / resort-add / resort-ai-confirm / gear-add / gear-detail
  navStack: [],
  apiKey: '',
  data: { trips: [], resorts: [], gear: [] },
  temp: { tripMembers: [], resortDraft: null, editTripId: null, gearFilter: 'owned', gearSport: 'snowboard' },
  chatHistory: [],
  costCalc: { members: 4, nights: 3, trans: 12000, lodge: 9000, lift: 8000, food: 3000 }
};

// ===== ローカルストレージ =====
function saveAll() {
  localStorage.setItem('snb-planner-v3', JSON.stringify({ data: state.data, apiKey: state.apiKey, costCalc: state.costCalc }));
}
function loadAll() {
  try {
    var s = JSON.parse(localStorage.getItem('snb-planner-v3') || '{}');
    if (s.data) state.data = s.data;
    if (!state.data.gear) state.data.gear = [];
    if (s.apiKey) state.apiKey = s.apiKey;
    if (s.costCalc) state.costCalc = s.costCalc;
  } catch(e) {}
}

// ===== ナビゲーション =====
function navigate(screen, title, backLabel, showRight, rightLabel) {
  state.navStack.push({ screen: state.screen, tab: state.tab, title: document.getElementById('nav-title').textContent });
  state.screen = screen;
  setNavBar(title, backLabel || '戻る', showRight, rightLabel);
  render();
}

function goBack() {
  if (state.navStack.length === 0) return;
  var prev = state.navStack.pop();
  state.screen = prev.screen;
  if (state.navStack.length === 0) {
    setNavBar(tabTitles[state.tab], '', false);
  } else {
    var prevPrev = state.navStack[state.navStack.length - 1];
    setNavBar(prev.title, prevPrev.title, true);
  }
  render();
}

function setNavBar(title, backLabel, showBack, showRight, rightLabel) {
  document.getElementById('nav-title').textContent = title || '';
  var backBtn = document.getElementById('nav-back-btn');
  var rightBtn = document.getElementById('nav-right-btn');
  if (showBack) { backBtn.style.visibility = 'visible'; backBtn.textContent = backLabel || '戻る'; }
  else { backBtn.style.visibility = 'hidden'; }
  if (showRight) { rightBtn.style.visibility = 'visible'; rightBtn.textContent = rightLabel || '完了'; }
  else { rightBtn.style.visibility = 'hidden'; }
}

var tabTitles = { trips: '遠征プランナー', resorts: 'お気に入りゲレンデ', cost: '費用シミュレーター', ai: 'AI相談', gear: 'ギア管理' };

function switchTab(tab) {
  state.tab = tab;
  state.screen = 'main';
  state.navStack = [];
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  setNavBar(tabTitles[tab], '', false, false);
  render();
}

function navRightAction() {
  if (state.screen === 'trip-add') saveTrip();
  if (state.screen === 'resort-add-input') aiSearchResort();
}

// ===== レンダリングのディスパッチ =====
function render() {
  var el = document.getElementById('content-inner');
  if (state.screen === 'main') {
    if (state.tab === 'trips') el.innerHTML = renderTripsMain();
    else if (state.tab === 'resorts') el.innerHTML = renderResortsMain();
    else if (state.tab === 'cost') el.innerHTML = renderCost();
    else if (state.tab === 'ai') el.innerHTML = renderAI();
    else if (state.tab === 'gear') el.innerHTML = renderGearMain();
  } else if (state.screen === 'trip-add') el.innerHTML = renderTripAdd();
  else if (state.screen === 'trip-detail') el.innerHTML = renderTripDetail();
  else if (state.screen === 'resort-detail') el.innerHTML = renderResortDetail();
  else if (state.screen === 'resort-add-input') el.innerHTML = renderResortAddInput();
  else if (state.screen === 'resort-ai-confirm') el.innerHTML = renderResortAIConfirm();
  else if (state.screen === 'apikey') el.innerHTML = renderApiKeyScreen();
  else if (state.screen === 'gear-add') el.innerHTML = renderGearAdd();
  else if (state.screen === 'gear-detail') el.innerHTML = renderGearDetail();
  document.getElementById('content').scrollTop = 0;
  if (state.tab === 'cost') bindCostInputs();
  if (state.tab === 'ai' && state.screen === 'main') scrollChatToBottom();
}

// ===== APIキーチェック =====
function checkApiKey(cb) {
  if (state.apiKey) { cb(); return; }
  state._pendingCb = cb;
  navigate('apikey', 'APIキー設定', '戻る', false);
}

function renderApiKeyScreen() {
  return '<div class="apikey-banner">'
    + '<div class="apikey-banner-title">⚠️ Gemini APIキーが必要です</div>'
    + '<div class="apikey-banner-text">AI機能を使うにはGoogle Gemini APIキーを設定してください。キーはこのデバイスのローカルストレージのみに保存されます。</div>'
    + '<div class="apikey-input-row"><input id="apikey-input" type="password" placeholder="AIza..." value="' + (state.apiKey || '') + '">'
    + '<button onclick="saveApiKey()">保存</button></div>'
    + '</div>';
}

function saveApiKey() {
  var val = document.getElementById('apikey-input').value.trim();
  if (!val) return;
  state.apiKey = val;
  saveAll();
  goBack();
  if (state._pendingCb) { var cb = state._pendingCb; state._pendingCb = null; cb(); }
}

// ===== 遠征タブ =====
function renderTripsMain() {
  var html = '';

  // APIキー設定バナー（未設定時のみ）
  if (!state.apiKey) {
    html += '<div style="margin:16px;background:#fff3cd;border-radius:12px;padding:12px 14px;cursor:pointer" onclick="navigate(\'apikey\',\'APIキー設定\',\'戻る\')">'
      + '<div style="font-size:14px;font-weight:600;color:#856404">⚙️ Gemini APIキーを設定するとAI機能が使えます</div>'
      + '<div style="font-size:12px;color:#856404;margin-top:3px">タップして設定 →</div></div>';
  }

  // 遠征リスト
  html += '<div class="list-section"><div class="list-header">登録済み遠征</div>';
  if (!state.data.trips.length) {
    html += '<div class="list-group"><div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-title">遠征がありません</div><div class="empty-sub">下のボタンから追加しよう</div></div></div>';
  } else {
    html += '<div class="list-group">';
    state.data.trips.forEach(function(t) {
      var nights = '';

function renderTripDetail() {
  var t = state.data.trips.find(function(x) { return x.id == state.temp.viewTripId; });
  if (!t) return '<div class="empty-state">データが見つかりません</div>';
  var resort = state.data.resorts.find(function(r) { return r.id == t.resortId; });
  var nights = '';
  var scheduleRows = '';
  if (t.start && t.end) {
    var startD = new Date(t.start);
    var endD = new Date(t.end);
    var nDays = Math.round((endD - startD) / 86400000);
    nights = nDays + '泊' + (nDays + 1) + '日';
    var weekdays = ['日','月','火','水','木','金','土'];
    for (var i = 0; i <= nDays; i++) {
      var d = new Date(startD); d.setDate(d.getDate() + i);
      var label = (d.getMonth()+1) + '/' + d.getDate();
      var w = weekdays[d.getDay()];
      var title = i === 0 ? '移動日（出発）' : i === nDays ? '帰宅日（移動）' : (resort ? resort.name + '　滑走' : '滑走');
      var sub = i === 0 ? '新宿 → ' + (resort ? resort.name : '現地') : i === nDays ? '現地 → 帰宅' : '終日滑走';
      scheduleRows += '<div class="schedule-row">'
        + '<div class="schedule-date"><div class="schedule-date-d">' + label + '</div><div class="schedule-date-w">(' + w + ')</div></div>'
        + '<div class="schedule-body"><div class="schedule-title">' + title + '</div><div class="schedule-sub">' + sub + '</div></div></div>';
    }
  }

  var membersHtml = '';
  if (t.members && t.members.length) {
    t.members.forEach(function(m) {
      membersHtml += '<span class="chip" style="margin:3px">' + esc(m) + '</span>';
    });
  } else {
    membersHtml = '<span class="chip-empty" style="padding:4px 0">未設定</span>';
  }

  return '<div class="hero-card">'
    + '<div class="hero-name">' + esc(t.name) + '</div>'
    + '<div class="hero-sub">' + esc(resort ? resort.name : (t.resortName || 'ゲレンデ未定')) + (nights ? ' · ' + nights : '') + '</div>'
    + '<div class="hero-stats">'
    + '<div class="hero-stat"><div class="hstat-v">' + (t.members ? t.members.length : 0) + '人</div><div class="hstat-l">メンバー</div></div>'
    + '<div class="hero-stat"><div class="hstat-v">' + (t.budget ? '¥' + Math.round(t.budget / 1000) + 'k' : '—') + '</div><div class="hstat-l">一人予算</div></div>'
    + '<div class="hero-stat"><div class="hstat-v">' + (nights || '—') + '</div><div class="hstat-l">日程</div></div>'
    + '</div></div>'

    + (scheduleRows ? '<div class="list-section"><div class="list-header">日程</div><div class="schedule-list">' + scheduleRows + '</div></div>' : '')

    + '<div class="list-section"><div class="list-header">メンバー</div>'
    + '<div class="list-group"><div class="chips-wrap">' + membersHtml + '</div></div></div>'

    + (resort ? '<div class="list-section"><div class="list-header">ゲレンデ情報</div>'
      + '<div class="list-group"><div class="list-row" onclick="openResortDetailFromTrip(\'' + resort.id + '\')">'
      + '<div class="list-row-icon icon-blue" style="font-size:15px">⛷️</div>'
      + '<div class="list-row-body"><div class="list-row-title">' + esc(resort.name) + '</div>'
      + '<div class="list-row-sub">' + esc((resort.altitude_top || '') + (resort.courses ? ' · ' + resort.courses : '')) + '</div></div>'
      + '<span class="chevron">›</span></div></div></div>' : '')

    + '<button class="ios-btn btn-danger" onclick="deleteTrip(' + t.id + ')">この遠征を削除</button>';
}

async function aiSearchResort() {
  var inp = document.getElementById('resort-name-input');
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) { showStatus('resort-add-status', 'ゲレンデ名を入力してください', 'error'); return; }
  var loading = document.getElementById('resort-search-loading');
  if (loading) loading.style.display = 'block';
  try {
    var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + state.apiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: 'あなたは日本のスキー場の専門家です。ゲレンデ名を受け取ったら情報をJSONのみで返してください。他のテキストは一切含めないでください。フォーマット: {"name":"正式名称","prefecture":"都道府県","area":"地域","altitude_top":"最高標高(例:1831m)","altitude_base":"麓標高(例:760m)","courses":"コース数(例:47本)","lifts":"リフト数(例:20本)","features":["特徴1","特徴2","特徴3"],"url":"公式サイトURL","notes":"一言メモ"}' }] },
        contents: [{ role: 'user', parts: [{ text: name + 'のスキー場情報を返してください' }] }],
        generationConfig: { maxOutputTokens: 1000 }
      })
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    var text = data.candidates && data.candidates[0] ? data.candidates[0].content.parts[0].text : '';
    var json = JSON.parse(text.replace(/```json|```/g, '').trim());
    json.id = Date.now();
    json.snow = null; json.hours = null; json.snowDetail = null; json.lastUpdated = null;
    state.temp.resortDraft = json;
    navigate('resort-ai-confirm', json.name, '戻る', false);
  } catch(e) {
    if (loading) loading.style.display = 'none';
    showStatus('resort-add-status', 'エラー: ' + e.message, 'error');
  }
}

function scrollChatToBottom() {
  var el = document.getElementById('chat-msgs');
  if (el) el.scrollTop = el.scrollHeight;
}

function quickChat(msg) {
  document.getElementById('chat-input').value = msg;
  sendChat();
}

async function sendChat() {
  checkApiKey(async function() {
    var inp = document.getElementById('chat-input');
    if (!inp) return;
    var msg = inp.value.trim();
    if (!msg) return;
    inp.value = '';
    var btn = document.getElementById('chat-send-btn');
    if (btn) btn.disabled = true;

    state.chatHistory.push({ role: 'user', content: msg });
    render();

    var resortNames = state.data.resorts.map(function(r) { return r.name; }).join('、') || 'なし';
    var tripNames = state.data.trips.map(function(t) { return t.name; }).join('、') || 'なし';
    var sys = 'あなたはスノーボード遠征の専門アドバイザー。ユーザーは東京・町田市在住24歳、スノボ歴6年の上級者で毎週のように滑りに行く。登録ゲレンデ:' + resortNames + '。登録遠征:' + tripNames + '。返答は200文字以内で簡潔に。';

    try {
      var contents = state.chatHistory.slice(-14).map(function(m) {
        return { role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: m.content }] };
      });
      var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + state.apiKey, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: sys }] },
          contents: contents,
          generationConfig: { maxOutputTokens: 1000 }
        })
      });
      var data = await res.json();
      if (data.error) {
        state.chatHistory.push({ role: 'ai', content: 'APIエラー: ' + (data.error.message || JSON.stringify(data.error)) });
      } else {
        var reply = data.candidates && data.candidates[0] ? data.candidates[0].content.parts[0].text : '返答が取得できませんでした。';
        state.chatHistory.push({ role: 'ai', content: reply });
      }
    } catch(e) {
      state.chatHistory.push({ role: 'ai', content: 'ネットワークエラー: ' + e.message });
    }
    render();
    scrollChatToBottom();
  });
}

  d.brand    = (document.getElementById('g-brand')    || {}).value || d.brand    || '';
  d.model    = (document.getElementById('g-model')    || {}).value || d.model    || '';
  d.size     = (document.getElementById('g-size')     || {}).value || d.size     || '';
  d.year     = (document.getElementById('g-year')     || {}).value || d.year     || '';
  d.price    = (document.getElementById('g-price')    || {}).value || d.price    || '';
  d.shop     = (document.getElementById('g-shop')     || {}).value || d.shop     || '';
  d.memo     = (document.getElementById('g-memo')     || {}).value || d.memo     || '';
  d.category = (document.getElementById('g-category') || {}).value || d.category || '';

  if (!d.category) { showStatus('gear-status', 'カテゴリを選択してください', 'error'); return; }
  d.id = Date.now();
  state.data.gear.push(d);
  saveAll();
  // フィルタを保存したギアのsport/statusに合わせる
  state.temp.gearSport  = d.sport;
  state.temp.gearFilter = d.status;
  goBack();
}

function openGearDetail(id) {
  state.temp.viewGearId = id;
  var g = state.data.gear.find(function(x){ return x.id == id; });
  navigate('gear-detail', g ? (g.name || 'ギア詳細') : 'ギア詳細', 'ギア', false);
}

function renderGearDetail() {
  var g = state.data.gear.find(function(x){ return x.id == state.temp.viewGearId; });
  if (!g) return '<div class="empty-state">データが見つかりません</div>';
  var cats = GEAR_CATEGORIES[g.sport] || GEAR_CATEGORIES.snowboard;
  var cat = cats.find(function(c){ return c.key === g.category; }) || { icon: '📦', label: 'その他' };
  var sportLabel = g.sport === 'ski' ? '⛷️ スキー' : '🏂 スノーボード';
  var statusLabel = g.status === 'wishlist' ? '⭐ ほしいリスト' : '✅ 所持中';

  return '<div class="hero-card" style="margin-top:16px">'
    + '<div style="font-size:36px;margin-bottom:8px">' + cat.icon + '</div>'
    + '<div class="hero-name">' + esc(g.name || cat.label) + '</div>'
    + '<div class="hero-sub">' + esc(cat.label) + ' · ' + sportLabel + '</div>'
    + '<div class="hero-tags">'
    + '<span class="hero-tag">' + statusLabel + '</span>'
    + (g.year ? '<span class="hero-tag">' + esc(g.year) + 'モデル</span>' : '')
    + (g.size ? '<span class="hero-tag">' + esc(g.size) + '</span>' : '')
    + '</div>'
    + '</div>'

    + '<div class="info-section">'
    + infoRow('ブランド', g.brand)
    + infoRow('モデル名', g.model)
    + infoRow('サイズ', g.size)
    + infoRow('年式', g.year ? g.year + 'モデル' : '')
    + infoRow('価格', g.price ? '¥' + Number(g.price).toLocaleString() : '')
    + infoRow('購入店', g.shop)
    + '</div>'

    + (g.memo ? '<div style="margin:12px 16px;background:var(--white);border-radius:12px;padding:14px 16px">'
      + '<div style="font-size:13px;color:var(--text3);margin-bottom:6px">メモ</div>'
      + '<div style="font-size:15px;color:var(--text);line-height:1.6">' + esc(g.memo) + '</div></div>' : '')

    + '<button class="ios-btn btn-secondary" onclick="toggleGearStatus(' + g.id + ')">'
    + (g.status === 'wishlist' ? '✅ 所持中に移動' : '⭐ ほしいリストに移動') + '</button>'
    + '<button class="ios-btn btn-danger" onclick="deleteGear(' + g.id + ')">このギアを削除</button>';
}

function infoRow(key, val) {
  if (!val) return '';
  return '<div class="info-row"><span class="info-key">' + key + '</span><span class="info-val">' + esc(val) + '</span></div>';
}

function toggleGearStatus(id) {
  var g = state.data.gear.find(function(x){ return x.id == id; });
  if (!g) return;
  g.status = g.status === 'wishlist' ? 'owned' : 'wishlist';
  saveAll();
  render();
}

function deleteGear(id) {
  if (!confirm('このギアを削除しますか？')) return;
  state.data.gear = state.data.gear.filter(function(x){ return x.id != id; });
  saveAll();
  goBack();
}

// ===== ユーティリティ =====
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showStatus(id, msg, type) {
  var el = document.getElementById(id);
  if (!el) return;
  el.style.color = type === 'error' ? 'var(--red)' : 'var(--green)';
  el.textContent = msg;
  setTimeout(function() { if (el) el.textContent = ''; }, 3000);
}
function openUrl(url) { window.open(url, '_blank'); }

// ===== 起動 =====
loadAll();
render();
</script>
</body>
</html>
