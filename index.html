<!DOCTYPE html>
<html lang="ja">
<head>
 <link rel="icon" href="favicon.ico" type="image/x-icon">
 <link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="遠征プランナー">
<title>スノボ遠征プランナー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #f2f2f7; font-family: -apple-system, 'Hiragino Sans', sans-serif; overscroll-behavior: none; }
  :root {
    --navy: #0a1628; --blue: #007aff; --blue-light: #e8f1ff;
    --green: #34c759; --red: #ff3b30;
    --gray2: #c7c7cc; --gray3: #f2f2f7; --gray4: #e5e5ea;
    --white: #ffffff; --text: #000000; --text2: #3c3c43; --text3: #8e8e93;
    --sep: rgba(60,60,67,0.12);
    --tab-h: 83px; --safe-b: env(safe-area-inset-bottom,0px); --safe-t: env(safe-area-inset-top,44px);
  }
  #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  /* ナビバー */
  .nav { background:rgba(255,255,255,0.92); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:0.5px solid var(--sep); padding-top:var(--safe-t); flex-shrink:0; z-index:10; }
  .nav-inner { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
  .nav-title { font-size:17px; font-weight:600; color:var(--text); }
  .nav-btn { font-size:17px; color:var(--blue); background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; }
  .nav-back::before { content:'‹'; font-size:22px; margin-right:2px; }

  /* コンテンツ */
  .content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .ci { padding-bottom:calc(var(--tab-h) + 8px); }

  /* タブバー */
  .tabbar { position:fixed; bottom:0; left:0; right:0; height:var(--tab-h); background:rgba(255,255,255,0.92); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-top:0.5px solid var(--sep); display:flex; z-index:100; padding-bottom:var(--safe-b); }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border:none; background:none; cursor:pointer; padding-top:8px; color:var(--gray2); font-family:inherit; }
  .tab.on { color:var(--blue); }
  .ti { font-size:24px; line-height:1; }
  .tl { font-size:10px; font-weight:500; }

  /* リスト */
  .sec { margin:20px 16px 0; }
  .sh { font-size:13px; color:var(--text3); margin-bottom:6px; padding:0 4px; text-transform:uppercase; letter-spacing:0.03em; }
  .lg { background:var(--white); border-radius:12px; overflow:hidden; }
  .lr { display:flex; align-items:center; min-height:44px; padding:10px 16px; border-bottom:0.5px solid var(--sep); gap:12px; cursor:pointer; -webkit-user-select:none; }
  .lr:last-child { border-bottom:none; }
  .lr:active { background:var(--gray3); }
  .li { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .lb { flex:1; min-width:0; }
  .lt { font-size:17px; color:var(--text); }
  .ls { font-size:13px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cv { color:var(--gray2); font-size:18px; }

  /* ヒーローカード */
  .hc { background:var(--navy); border-radius:16px; padding:20px; color:#fff; margin:16px; }
  .hc.grn { background:linear-gradient(135deg,#1a472a,#2d6a4f); }
  .hn { font-size:22px; font-weight:600; margin-bottom:3px; }
  .hsub { font-size:14px; color:rgba(255,255,255,0.65); margin-bottom:14px; }
  .htags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .htag { font-size:12px; padding:3px 10px; border-radius:10px; background:rgba(255,255,255,0.18); color:rgba(255,255,255,0.95); }
  .hstats { display:grid; grid-template-columns:repeat(3,1fr); border-top:0.5px solid rgba(255,255,255,0.2); padding-top:14px; }
  .hst { text-align:center; }
  .hst+.hst { border-left:0.5px solid rgba(255,255,255,0.2); }
  .hstv { font-size:17px; font-weight:600; }
  .hstl { font-size:11px; color:rgba(255,255,255,0.55); margin-top:2px; }
  .hurl { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.12); border-radius:10px; padding:10px 12px; margin-top:12px; cursor:pointer; }
  .hurl span { font-size:13px; color:rgba(255,255,255,0.85); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* フォーム */
  .fs { margin:16px 16px 0; }
  .fg { background:var(--white); border-radius:12px; overflow:hidden; }
  .fr { display:flex; align-items:center; min-height:44px; padding:0 16px; border-bottom:0.5px solid var(--sep); gap:12px; }
  .fr:last-child { border-bottom:none; }
  .fl { font-size:16px; color:var(--text); min-width:82px; flex-shrink:0; }
  .fl.sm { font-size:14px; min-width:72px; }
  .fr input, .fr select, .fr textarea { flex:1; border:none; outline:none; font-size:16px; color:var(--text); background:transparent; font-family:inherit; text-align:right; min-height:44px; -webkit-appearance:none; }
  .fr input::placeholder { color:var(--gray2); }
  .fr textarea { text-align:left; resize:none; padding:10px 0; min-height:72px; font-size:15px; }
  .fu { font-size:14px; color:var(--text3); flex-shrink:0; }

  /* チップ */
  .cw { padding:10px 12px; display:flex; flex-wrap:wrap; gap:6px; min-height:44px; align-items:center; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:var(--blue-light); border-radius:16px; padding:5px 5px 5px 12px; font-size:14px; color:var(--blue); }
  .cdel { width:20px; height:20px; border-radius:50%; background:rgba(0,122,255,0.2); color:var(--blue); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; }
  .ce { font-size:14px; color:var(--text3); }

  /* ボタン */
  .btn { display:block; width:calc(100% - 32px); margin:12px 16px; padding:14px; border:none; border-radius:12px; font-size:17px; font-weight:500; font-family:inherit; cursor:pointer; text-align:center; -webkit-appearance:none; }
  .btn:active { opacity:0.75; }
  .bp { background:var(--navy); color:#fff; }
  .bs { background:var(--white); color:var(--blue); border:0.5px solid var(--sep); }
  .bd { background:var(--white); color:var(--red); border:0.5px solid var(--sep); }

  /* 情報行 */
  .is { margin:12px 16px 0; background:var(--white); border-radius:12px; overflow:hidden; }
  .ir { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 16px; border-bottom:0.5px solid var(--sep); gap:12px; }
  .ir:last-child { border-bottom:none; }
  .ik { font-size:15px; color:var(--text3); flex-shrink:0; }
  .iv { font-size:15px; color:var(--text); font-weight:500; text-align:right; flex:1; word-break:break-all; }
  .iv.url { color:var(--blue); cursor:pointer; }

  /* セグメント */
  .seg { display:flex; background:var(--gray4); border-radius:9px; padding:2px; margin:0 16px 10px; }
  .sb { flex:1; padding:7px; border:none; border-radius:7px; font-size:14px; font-family:inherit; cursor:pointer; color:var(--text3); background:transparent; }
  .sb.on { background:var(--white); font-weight:600; color:var(--text); }

  /* 費用バー */
  .cbr { padding:10px 16px; border-bottom:0.5px solid var(--sep); }
  .cbr:last-child { border-bottom:none; }
  .cbl { display:flex; justify-content:space-between; margin-bottom:5px; }
  .cbn { font-size:14px; color:var(--text2); }
  .cbv { font-size:14px; font-weight:500; }
  .cbb { background:var(--gray3); border-radius:4px; height:6px; overflow:hidden; }
  .cbf { height:6px; border-radius:4px; transition:width 0.3s; }

  /* スケジュール */
  .schl { background:var(--white); border-radius:12px; overflow:hidden; }
  .schr { display:flex; gap:12px; padding:12px 16px; border-bottom:0.5px solid var(--sep); align-items:flex-start; }
  .schr:last-child { border-bottom:none; }
  .schd { width:40px; text-align:center; flex-shrink:0; }
  .schdd { font-size:13px; font-weight:600; }
  .schdw { font-size:11px; color:var(--text3); }
  .schb { flex:1; }
  .scht { font-size:15px; font-weight:500; }
  .schs { font-size:13px; color:var(--text3); margin-top:1px; }

  /* メンバーチップ */
  .mc { display:inline-flex; align-items:center; gap:6px; background:var(--blue-light); border-radius:16px; padding:5px 5px 5px 12px; font-size:14px; color:var(--blue); margin:3px; }
  .mcd { width:20px; height:20px; border-radius:50%; background:rgba(0,122,255,0.2); color:var(--blue); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; }

  /* 空状態 */
  .empty { text-align:center; padding:48px 24px; color:var(--text3); }
  .eico { font-size:48px; margin-bottom:12px; }
  .etit { font-size:17px; font-weight:500; color:var(--text2); margin-bottom:6px; }
  .esub { font-size:14px; }
  .sm-gap { height:12px; }
  .status { text-align:center; font-size:14px; color:var(--green); padding:6px 16px; min-height:28px; }
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <div class="nav-inner">
      <button class="nav-btn nav-back" id="bb" style="visibility:hidden" onclick="goBack()">戻る</button>
      <span class="nav-title" id="nt">遠征プランナー</span>
      <button class="nav-btn" id="rb" style="visibility:hidden" onclick="navRight()">保存</button>
    </div>
  </div>
  <div class="content" id="ct"><div class="ci" id="ci"></div></div>
  <div class="tabbar">
    <button class="tab on" id="tab-trips"   onclick="sw('trips')">  <span class="ti">🗓</span> <span class="tl">遠征</span></button>
    <button class="tab"    id="tab-resorts" onclick="sw('resorts')"><span class="ti">⛷️</span><span class="tl">ゲレンデ</span></button>
    <button class="tab"    id="tab-cost"    onclick="sw('cost')">   <span class="ti">💰</span> <span class="tl">費用</span></button>
    <button class="tab"    id="tab-gear"    onclick="sw('gear')">   <span class="ti">🎿</span> <span class="tl">ギア</span></button>
  </div>
</div>
<script>
// ===== STATE =====
var S = {
  tab:'trips', screen:'main', stack:[],
  data:{ trips:[], resorts:[], gear:[] },
  tmp:{ tripMem:[], resortFeat:[], gearDraft:null, gearFilter:'owned', gearSport:'snowboard', vTrip:null, vResort:null, vGear:null },
  cost:{ members:4, nights:3, trans:12000, lodge:9000, lift:8000, food:3000 }
};
var TITLES = { trips:'遠征プランナー', resorts:'お気に入りゲレンデ', cost:'費用シミュレーター', gear:'ギア管理' };

// ===== STORAGE =====
function save() { try { localStorage.setItem('snb-v4', JSON.stringify({data:S.data,cost:S.cost})); } catch(e){} }
function load() {
  try {
    var d = JSON.parse(localStorage.getItem('snb-v4') || localStorage.getItem('snb-planner-v3') || '{}');
    if (d.data) { S.data = d.data; if (!S.data.gear) S.data.gear = []; if (!S.data.resorts) S.data.resorts = []; if (!S.data.trips) S.data.trips = []; }
    if (d.cost) S.cost = d.cost;
    if (d.costCalc) S.cost = d.costCalc;
  } catch(e) {}
}

// ===== NAV =====
function nav(screen, title, back, showRight, rightLbl) {
  S.stack.push({ screen:S.screen, title:document.getElementById('nt').textContent });
  S.screen = screen;
  nb(title, back||'戻る', true, showRight, rightLbl||'保存');
  render();
}
function goBack() {
  if (!S.stack.length) return;
  var p = S.stack.pop();
  S.screen = p.screen;
  if (!S.stack.length) nb(TITLES[S.tab],'',false,false);
  else nb(p.title, S.stack[S.stack.length-1].title, true, false);
  render();
}
function nb(title, backLbl, showBack, showRight, rightLbl) {
  document.getElementById('nt').textContent = title||'';
  var bb=document.getElementById('bb'), rb=document.getElementById('rb');
  bb.style.visibility = showBack?'visible':'hidden'; bb.textContent = backLbl||'戻る';
  rb.style.visibility = showRight?'visible':'hidden'; rb.textContent = rightLbl||'保存';
}
function navRight() {
  if (S.screen==='trip-add')    saveTrip();
  else if (S.screen==='resort-add')  saveResort();
  else if (S.screen==='gear-add')    saveGear();
}
function sw(tab) {
  S.tab=tab; S.screen='main'; S.stack=[];
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('tab-'+tab).classList.add('on');
  nb(TITLES[tab],'',false,false);
  render();
}

// ===== RENDER =====
function render() {
  var h = '';
  if (S.screen==='main') {
    if (S.tab==='trips')   h=rTrips();
    else if (S.tab==='resorts') h=rResorts();
    else if (S.tab==='cost')    h=rCost();
    else if (S.tab==='gear')    h=rGear();
  } else if (S.screen==='trip-add')     h=rTripAdd();
  else if (S.screen==='trip-detail')    h=rTripDetail();
  else if (S.screen==='resort-add')     h=rResortAdd();
  else if (S.screen==='resort-detail')  h=rResortDetail();
  else if (S.screen==='gear-add')       h=rGearAdd();
  else if (S.screen==='gear-detail')    h=rGearDetail();
  document.getElementById('ci').innerHTML = h;
  document.getElementById('ct').scrollTop = 0;
}

function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function st(id,msg,type){ var el=document.getElementById(id); if(!el)return; el.style.color=type==='err'?'var(--red)':'var(--green)'; el.textContent=msg; setTimeout(function(){if(el)el.textContent='';},3000); }
function gv(id){ var el=document.getElementById(id); return el?el.value.trim():''; }
function lr(icon,bg,title,sub,oc){ return '<div class="lr" onclick="'+oc+'"><div class="li" style="background:'+bg+'">'+icon+'</div><div class="lb"><div class="lt">'+e(title)+'</div>'+(sub?'<div class="ls">'+e(sub)+'</div>':'')+'</div><span class="cv">›</span></div>'; }
function nights(s,en){ if(!s||!en)return''; var d=Math.round((new Date(en)-new Date(s))/86400000); return d>0?d+'泊'+(d+1)+'日':''; }
function openUrl(url){ window.open(url,'_blank'); }

// ===================================================
// 遠征
// ===================================================
function rTrips() {
  var h='<div class="sec"><div class="sh">登録済み遠征</div>';
  if (!S.data.trips.length) {
    h+='<div class="lg"><div class="empty"><div class="eico">🗓</div><div class="etit">遠征がありません</div><div class="esub">追加ボタンから登録しよう</div></div></div>';
  } else {
    h+='<div class="lg">';
    S.data.trips.forEach(function(t){
      var r=S.data.resorts.find(function(x){return x.id==t.resortId;});
      var sub=(r?r.name:(t.resortName||'ゲレンデ未定'))+(nights(t.start,t.end)?' · '+nights(t.start,t.end):'')+(t.members&&t.members.length?' · '+t.members.length+'人':'');
      h+=lr('🗓','#0a1628',t.name,sub,'openTripDetail('+t.id+')');
    });
    h+='</div>';
  }
  return h+'</div><div class="sm-gap"></div><button class="btn bp" onclick="openTripAdd()">＋ 新しい遠征を追加</button>';
}

function openTripAdd(){ S.tmp.tripMem=[]; nav('trip-add','新しい遠征','遠征',true,'保存'); }

function rTripAdd() {
  var opts='<option value="">未選択</option>';
  S.data.resorts.forEach(function(r){ opts+='<option value="'+r.id+'">'+e(r.name)+'</option>'; });
  var chips=S.tmp.tripMem.length
    ? S.tmp.tripMem.map(function(m,i){return'<span class="chip">'+e(m)+'<span class="cdel" onclick="rmTM('+i+')">×</span></span>';}).join('')
    : '<span class="ce">まだいません</span>';
  return '<div class="fs" style="margin-top:16px"><div class="sh">遠征情報</div><div class="fg">'
    +'<div class="fr"><span class="fl">遠征名</span><input id="f-name" type="text" placeholder="例：白馬遠征" style="text-align:right"></div>'
    +'<div class="fr"><span class="fl">ゲレンデ</span><select id="f-resort">'+opts+'</select></div>'
    +'<div class="fr"><span class="fl">出発日</span><input id="f-start" type="date"></div>'
    +'<div class="fr"><span class="fl">帰着日</span><input id="f-end" type="date"></div>'
    +'<div class="fr"><span class="fl">予算/人</span><input id="f-budget" type="number" placeholder="60000" style="text-align:right"><span class="fu">円</span></div>'
    +'</div></div>'
    +'<div class="fs" style="margin-top:12px"><div class="sh">メンバー</div><div class="fg">'
    +'<div class="cw" id="tm-chips">'+chips+'</div>'
    +'<div class="fr" style="border-top:0.5px solid var(--sep)"><input id="f-mem" type="text" placeholder="名前を入力..." style="flex:1;text-align:left"><button onclick="addTM()" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:14px;font-family:inherit;cursor:pointer">追加</button></div>'
    +'</div></div><div class="status" id="ts"></div>';
}

function addTM(){ var inp=document.getElementById('f-mem');if(!inp)return;var n=inp.value.trim();if(!n)return;S.tmp.tripMem.push(n);inp.value='';rfTM(); }
function rmTM(i){ S.tmp.tripMem.splice(i,1);rfTM(); }
function rfTM(){ var el=document.getElementById('tm-chips');if(!el)return;el.innerHTML=S.tmp.tripMem.length?S.tmp.tripMem.map(function(m,i){return'<span class="chip">'+e(m)+'<span class="cdel" onclick="rmTM('+i+')">×</span></span>';}).join(''):'<span class="ce">まだいません</span>'; }

function saveTrip(){
  var name=gv('f-name');if(!name){st('ts','遠征名を入力してください','err');return;}
  var rid=gv('f-resort'),r=S.data.resorts.find(function(x){return x.id==rid;});
  S.data.trips.push({id:Date.now(),name:name,resortId:rid,resortName:r?r.name:'',start:gv('f-start'),end:gv('f-end'),budget:parseInt(gv('f-budget'))||0,members:S.tmp.tripMem.slice()});
  save(); goBack();
}

function openTripDetail(id){ S.tmp.vTrip=id;var t=S.data.trips.find(function(x){return x.id==id;});nav('trip-detail',t?t.name:'遠征詳細','遠征',false); }

function rTripDetail(){
  var t=S.data.trips.find(function(x){return x.id==S.tmp.vTrip;});
  if(!t)return'<div class="empty">データなし</div>';
  var r=S.data.resorts.find(function(x){return x.id==t.resortId;});
  var ni=nights(t.start,t.end);
  var sched='';
  if(t.start&&t.end){
    var s=new Date(t.start),en=new Date(t.end),nd=Math.round((en-s)/86400000),wd=['日','月','火','水','木','金','土'];
    for(var i=0;i<=nd;i++){var d=new Date(s);d.setDate(d.getDate()+i);var lbl=(d.getMonth()+1)+'/'+d.getDate();var w=wd[d.getDay()];var tit=i===0?'移動日（出発）':i===nd?'帰宅日（移動）':(r?r.name+'　滑走':'滑走');var su=i===0?'新宿 → '+(r?r.name:'現地'):i===nd?'現地 → 帰宅':'終日滑走';sched+='<div class="schr"><div class="schd"><div class="schdd">'+lbl+'</div><div class="schdw">('+w+')</div></div><div class="schb"><div class="scht">'+tit+'</div><div class="schs">'+su+'</div></div></div>';}
  }
  var mems=(t.members&&t.members.length)?t.members.map(function(m){return'<span class="mc">'+e(m)+'</span>';}).join(''):'<span class="ce" style="padding:4px 0">未設定</span>';
  return '<div class="hc"><div class="hn">'+e(t.name)+'</div>'
    +'<div class="hsub">'+e(r?r.name:(t.resortName||'ゲレンデ未定'))+(ni?' · '+ni:'')+'</div>'
    +'<div class="hstats"><div class="hst"><div class="hstv">'+(t.members?t.members.length:0)+'人</div><div class="hstl">メンバー</div></div>'
    +'<div class="hst"><div class="hstv">'+(t.budget?'¥'+Math.round(t.budget/1000)+'k':'—')+'</div><div class="hstl">一人予算</div></div>'
    +'<div class="hst"><div class="hstv">'+(ni||'—')+'</div><div class="hstl">日程</div></div></div></div>'
    +(sched?'<div class="sec"><div class="sh">日程</div><div class="schl">'+sched+'</div></div>':'')
    +'<div class="sec"><div class="sh">メンバー</div><div class="lg"><div style="padding:10px 12px;display:flex;flex-wrap:wrap">'+mems+'</div></div></div>'

function rResortDetail(){
  var r=S.data.resorts.find(function(x){return x.id==S.tmp.vResort;});
  if(!r)return'<div class="empty">データなし</div>';
  var feats=(r.features||[]).map(function(f){return'<span class="htag">'+e(f)+'</span>';}).join('');
  var h='<div class="hc" style="margin-top:16px"><div class="hn">'+e(r.name)+'</div>'
    +'<div class="hsub">'+e((r.area||'')+(r.region?' · '+r.region:''))+'</div>'
    +(feats?'<div class="htags">'+feats+'</div>':'')
    +'<div class="hstats">'
    +'<div class="hst"><div class="hstv">'+e(r.courses||'—')+'</div><div class="hstl">コース数</div></div>'
    +'<div class="hst"><div class="hstv">'+e(r.lifts||'—')+'</div><div class="hstl">リフト数</div></div>'
    +'<div class="hst"><div class="hstv">'+e(r.altitude_top||'—')+'</div><div class="hstl">最高標高</div></div>'
    +'</div>'
    +(r.url?'<div class="hurl" onclick="openUrl(\''+e(r.url)+'\')"><span>🔗 '+e(r.url)+'</span><span style="color:rgba(255,255,255,0.6)">›</span></div>':'')
    +'</div>';

  // 営業情報
  var opRows='';
  if(r.season) opRows+=ir('営業期間',r.season);
  if(r.hours)  opRows+=ir('営業時間',r.hours);
  if(r.night)  opRows+=ir('ナイター', r.night);
  if(!opRows)  opRows+=ir('営業情報','未設定');
  h+='<div class="sec"><div class="sh">営業情報</div><div class="is" style="margin:0">'+opRows+'</div></div>';

  // コース情報
  var crRows='';
  if(r.courses)       crRows+=ir('コース数',  r.courses);
  if(r.lifts)         crRows+=ir('リフト数',  r.lifts);
  if(r.altitude_top)  crRows+=ir('最高標高',  r.altitude_top);
  if(r.altitude_base) crRows+=ir('麓標高',    r.altitude_base);
  if(r.level)         crRows+=ir('対象レベル',r.level);
  if(!crRows)         crRows+=ir('コース情報','未設定');
  h+='<div class="sec"><div class="sh">コース情報</div><div class="is" style="margin:0">'+crRows+'</div></div>';

  // メモ
  if(r.memo) h+='<div class="sec"><div class="sh">メモ</div><div class="lg"><div style="padding:12px 16px;font-size:15px;line-height:1.6">'+e(r.memo)+'</div></div></div>';

  // 遠征に設定
  h+='<div class="sec"><div class="sh">この遠征に設定する</div><div class="lg">';
  if(!S.data.trips.length){
    h+='<div class="lr"><div class="lb"><div class="lt" style="color:var(--text3)">遠征が登録されていません</div></div></div>';
  } else {
    S.data.trips.forEach(function(t){
      var isSet=t.resortId==r.id;
      h+='<div class="lr" onclick="setRT('+r.id+','+t.id+')">'
        +'<div class="lb"><div class="lt">'+e(t.name)+'</div></div>'
        +'<span style="font-size:14px;color:'+(isSet?'var(--green)':'var(--blue)')+';font-weight:500">'+(isSet?'✓ 設定済み':'設定する')+'</span></div>';
    });
  }
  h+='</div></div>';
  h+='<button class="btn bd" onclick="delResort('+r.id+')">登録を削除</button>';
  return h;
}

function ir(k,v){ return '<div class="ir"><span class="ik">'+e(k)+'</span><span class="iv">'+e(v)+'</span></div>'; }
function setRT(rid,tid){
  var t=S.data.trips.find(function(x){return x.id==tid;}),r=S.data.resorts.find(function(x){return x.id==rid;});
  if(!t||!r)return; t.resortId=rid; t.resortName=r.name; save(); render();

    +'<div class="hn">'+e(g.name||cat.label)+'</div>'
    +'<div class="hsub">'+e(cat.label)+' · '+(g.sport==='ski'?'⛷️ スキー':'🏂 スノーボード')+'</div>'
    +'<div class="htags"><span class="htag">'+(g.status==='wishlist'?'⭐ ほしいリスト':'✅ 所持中')+'</span>'
    +(g.year?'<span class="htag">'+e(g.year)+'モデル</span>':'')+(g.size?'<span class="htag">'+e(g.size)+'</span>':'')+'</div></div>'
    +'<div class="is">'
    +(g.brand?ir('ブランド',g.brand):'')+(g.model?ir('モデル名',g.model):'')
    +(g.size?ir('サイズ',g.size):'')+(g.year?ir('年式',g.year+'モデル'):'')
    +(g.price?ir('価格','¥'+Number(g.price).toLocaleString()):'')+(g.shop?ir('購入店',g.shop):'')
    +'</div>'
    +(g.memo?'<div style="margin:12px 16px 0;background:var(--white);border-radius:12px;padding:14px 16px"><div style="font-size:13px;color:var(--text3);margin-bottom:6px">メモ</div><div style="font-size:15px;line-height:1.6">'+e(g.memo)+'</div></div>':'')
    +'<button class="btn bs" onclick="togGS('+g.id+')">'+(g.status==='wishlist'?'✅ 所持中に移動':'⭐ ほしいリストに移動')+'</button>'
    +'<button class="btn bd" onclick="delGear('+g.id+')">このギアを削除</button>';
}
function togGS(id){ var g=S.data.gear.find(function(x){return x.id==id;});if(!g)return;g.status=g.status==='wishlist'?'owned':'wishlist';save();render(); }
function delGear(id){ if(!confirm('削除しますか？'))return;S.data.gear=S.data.gear.filter(function(x){return x.id!=id;});save();goBack(); }

// ===== 起動 =====
load(); render();
</script>
</body>
</html>
